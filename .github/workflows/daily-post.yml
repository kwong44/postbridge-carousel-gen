name: Daily Post

on:
  schedule:
    # 17:00 UTC = 07:00 HST — runs 2 hours before the 09:00 HST scheduled post time
    - cron: '0 17 * * *'
  workflow_dispatch:  # allow manual runs from GitHub UI

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to commit state.json + anchor image back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install canvas system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libcairo2-dev libjpeg-dev libpango1.0-dev libgif-dev librsvg2-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Run automate.js
        env:
          REPLICATE_API_KEY: ${{ secrets.REPLICATE_API_KEY }}
          POSTBRIDGE_API_KEY: ${{ secrets.POSTBRIDGE_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # OPENROUTER_MODEL: moonshotai/kimi-k2  # uncomment to override default
        run: node automate.js

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json media/anchor_girl.jpg
          git diff --staged --quiet && echo "No state changes to commit" || \
            git commit -m "chore: state update after daily post [skip ci]"
          git push
