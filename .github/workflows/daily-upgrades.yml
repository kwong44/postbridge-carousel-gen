name: Daily Upgrades Pipeline

on:
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-upgrades
  cancel-in-progress: false

jobs:
  run-upgrades:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run upgrades automation
        env:
          SKIP_POSTBRIDGE: "1"
          REPLICATE_API_KEY: ${{ secrets.REPLICATE_API_KEY }}
          POSTBRIDGE_API_KEY: ${{ secrets.POSTBRIDGE_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_NOTIFY_CHAT_ID: ${{ secrets.TELEGRAM_NOTIFY_CHAT_ID }}
        run: node automate.js --profile upgrades

      - name: Commit rotation updates
        run: |
          if git diff --quiet --exit-code -- state.upgrades.json topics.upgrades.md; then
            echo "No rotation changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.upgrades.json topics.upgrades.md
          git commit -m "chore: advance upgrades rotation"
          git push
